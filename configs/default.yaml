paths:
  docs: data/docs
  index: data/index/tfidf_index.joblib
  output: data/output
retrieval:
  mode: tfidf
  top_k: 3
  min_score: 0.05
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  hybrid_alpha: 0.5
chunking:
  max_chars: 1200
  overlap: 120
quality:
  min_citations: 1
llm_answer:
  enabled: false
  mode: template
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_BASE_URL
  model_env: OPENAI_MODEL
