paths:
  docs: data/docs
  index: data/index/tfidf_index.joblib
  output: data/output
retrieval:
  mode: tfidf
  top_k: 3
  min_score: 0.05
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  hybrid_alpha: 0.5
reranker:
  enabled: false
  mode: lexical
  top_k: 3
query_rewrite:
  enabled: false
  mode: rule_based
chunking:
  max_chars: 1200
  overlap: 120
quality:
  min_citations: 1
llm_answer:
  enabled: false
  mode: template
  api_key_env: OPENAI_API_KEY
  base_url_env: OPENAI_BASE_URL
  model_env: OPENAI_MODEL
external_docs:
  enabled: true
  external_dir: external
  imported_docs_dir: data/docs_imported
  max_external_docs_per_source: 30
  max_file_size_kb: 512
web:
  uploaded_docs_dir: data/docs_uploaded
  allow_github_clone: true
